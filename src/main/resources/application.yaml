spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "http://localhost:8080/api/auth/google/callback"
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "http://localhost:8080/api/auth/KAKAO/callback"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id



sns:
  google:
    url: https://accounts.google.com/o/oauth2/v2/auth
    token:
      url: https://oauth2.googleapis.com/token
    userinfo:
      url: https://www.googleapis.com/oauth2/v3/userinfo
    client:
      id: ${GOOGLE_CLIENT_ID}
      secret: ${GOOGLE_CLIENT_SECRET}
    callback:
      url: http://localhost:8080/login/oauth2/code/google
    scope: email,profile
  kakao:
    url: https://kauth.kakao.com/oauth/authorize
    token:
      url: https://kauth.kakao.com/oauth/token
    userinfo: https://kapi.kakao.com/v2/user/me
    client:
      id: "너의_카카오_ID"
      secret: "너의_카카오_SECRET"
    callback:
      url: http://localhost:8080/login/oauth2/code/kakao

jwt:
  secret: ${JWT_SECRET}
  expiration-time: ${JWT_EXPIRATION_TIME}
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}
logging:
  level:
    org.springframework.security.oauth2: DEBUG
    # 인증 성공 후 유저 정보를 불러오는 과정을 상세히 보여줍니다.
